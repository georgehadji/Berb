      verdict: "z-ai/glm-5"

# ============================================================================
# Experiment Configuration
# ============================================================================

experiment:
  mode: "colab_drive"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"

  sandbox:
    python_path: ".venv/Scripts/python.exe"
    gpu_required: false
    max_memory_mb: 4096

  colab_drive:
    drive_root: "C:/Users/tesse/My Drive/berb"
    poll_interval_sec: 30
    timeout_sec: 3600
    setup_script: "pip install torch torchvision numpy scipy -q"

# ============================================================================
# Security
# ============================================================================

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

# ============================================================================
# OpenCode Beast Mode
# ============================================================================

opencode:
  enabled: true
  auto: true
  complexity_threshold: 0.2
  timeout_sec: 600
  max_retries: 1
  workspace_cleanup: true

# ============================================================================
# Figure Agent
# ============================================================================

figure_agent:
  enabled: true
  min_figures: 3
  max_figures: 10
  max_iterations: 3
  render_timeout_sec: 30
  output_format: "python"
  nano_banana_enabled: true
  gemini_model: "gemini-2.5-flash-image"
  strict_mode: false
  dpi: 300

# ============================================================================
# Web Search Configuration
# ============================================================================

web_search:
  enabled: true
  tavily_api_key_env: "TAVILY_API_KEY"
  enable_scholar: true
  enable_crawling: true
  enable_pdf_extraction: true
  max_web_results: 10
  max_scholar_results: 10
  max_crawl_urls: 5

# ============================================================================
# Multi-Model Collaboration (Critique + Council)
# ============================================================================
# Based on Microsoft Copilot Researcher patterns:
# - Critique: Generate → Evaluate (different models)
# - Council: Multiple independent analyses → synthesis
# ============================================================================

multi_model:
  # Critique Pattern: Generation → Evaluation
  critique:
    enabled: true
    
    # Paper draft + revision stages
    stages: [17, 19]
    
    # Generator model (creates content)
    generator: "claude-3-sonnet"
    
    # Evaluator model (reviews content)
    evaluator: "gpt-4o"
    
    # Evaluation dimensions
    dimensions:
      - "factual_accuracy"
      - "completeness"
      - "citation_quality"
      - "clarity"
    
    # Auto-apply suggested changes (if confidence > threshold)
    auto_apply_threshold: 0.8

  # Council Pattern: Multiple models → Synthesis
  council:
    enabled: true
    
    # Synthesis, hypothesis generation, and decision stages
    stages: [7, 8, 15]
    
    # Models to use in council (parallel analysis)
    models:
      - "claude-opus"
      - "gpt-4o"
      - "deepseek-v3.2"
    
    # Judge model for synthesis
    judge: "claude-sonnet"
    
    # Consensus threshold for high-confidence decisions
    consensus_threshold: 0.8
    
    # Include divergent opinions in output
    include_divergences: true

# ============================================================================
# Hidden Consistent Evaluation (HCE)
# ============================================================================
# Based on AIRA2 (Meta FAIR) - prevents evaluation gaming
# Three-way split: search, selection, test criteria
# ============================================================================

hidden_eval:
  enabled: true
  
  # Use HCE during improvement loop (M2)
  use_in_improvement_loop: true
  
  # Use HCE for final paper selection
  use_for_selection: true
  
  # Track hidden scores for benchmarking
  track_hidden_scores: true
  
  # Criteria weights (optional - uses defaults if not specified)
  # search_criteria:
  #   dimensions: ["novelty", "technical_soundness", "clarity", "relevance"]
  #   weights: {novelty: 0.3, technical_soundness: 0.3, clarity: 0.2, relevance: 0.2}
  # 
  # selection_criteria:
  #   dimensions: ["impact", "rigor", "presentation", "reproducibility"]
  #   weights: {impact: 0.35, rigor: 0.35, presentation: 0.15, reproducibility: 0.15}
  # 
  # test_criteria:
  #   dimensions: ["ground_truth_accuracy", "citation_correctness", "claim_validity"]
  #   weights: {ground_truth_accuracy: 0.25, citation_correctness: 0.20, claim_validity: 0.20}

# ============================================================================
# Async Experiment Pool (AIRA2 + CAID)
# ============================================================================
# Parallel experiment execution with isolation
# ============================================================================

experiment_pool:
  enabled: true
  
  # Maximum parallel workers (CAID optimal: 4)
  max_workers: 4
  
  # Isolation mode: docker, worktree, sandbox
  isolation: "docker"
  
  # GPU access for workers
  gpu_enabled: true
  
  # Docker image for experiment execution
  docker_image: "berb/experiment:latest"
  
  # Timeout per experiment (seconds)
  timeout_per_experiment: 3600
