# Berb Configuration - Production Ready
# Generated: 2026-03-30

project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "UTC"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: false
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

# ============================================================================
# LLM Configuration
# ============================================================================

llm:
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"
  wire_api: "chat_completions"
  api_key_env: "OPENROUTER_API_KEY"
  api_key: "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"
  primary_model: "deepseek/deepseek-chat-v3"
  fallback_models:
    - "deepseek/deepseek-r1"
    - "qwen/qwen3.5-9b"
    - "minimax/minimax-m2.5:free"

# ============================================================================
# Reasoning Methods Configuration
# ============================================================================

reasoning:
