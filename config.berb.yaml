    minimax: 0.20
    mimo: 0.15
    glm: 0.10
    xai: 0.10
    kimi: 0.05
    perplexity: 0.05
    qwen: 0.03
    google: 0.02
  
  methods:
    multi_perspective:
      constructive: "xiaomi/mimo-v2-pro"
      destructive: "deepseek/deepseek-chat-v3"
      systemic: "z-ai/glm-5"
      minimalist: "minimax/minimax-m2.5:free"
      scoring: "deepseek/deepseek-r1"

    pre_mortem:
      narrative: "deepseek/deepseek-r1"
      root_cause: "deepseek/deepseek-chat-v3"
      early_warning: "minimax/minimax-m2.5:free"
      hardened: "xiaomi/mimo-v2-pro"

    bayesian:
      prior: "z-ai/glm-4.7-flash"
      likelihood: "minimax/minimax-m2.5:free"
      sensitivity: "deepseek/deepseek-chat-v3"

    debate:
      pro: "deepseek/deepseek-chat-v3"
      con: "deepseek/deepseek-r1"
      judge: "x-ai/grok-4.20-beta"

    dialectical:
      thesis: "z-ai/glm-5"
      antithesis: "deepseek/deepseek-chat-v3"
      synthesis: "moonshotai/kimi-k2.5"

    research:
      query: "perplexity/sonar-pro-search"
      synthesis: "deepseek/deepseek-chat-v3"
      gap: "minimax/minimax-m2.5:free"
      final: "xiaomi/mimo-v2-pro"

    socratic:
      clarification: "z-ai/glm-4.7-flash"
      assumption: "z-ai/glm-4.7-flash"
      evidence: "minimax/minimax-m2.5:free"
      perspective: "deepseek/deepseek-chat-v3"
      meta: "moonshotai/kimi-k2.5"

    scientific:
      observation: "z-ai/glm-4.7"
      hypothesis: "deepseek/deepseek-r1"
      prediction: "deepseek/deepseek-chat-v3"
      experiment: "moonshotai/kimi-k2.5"
      analysis: "minimax/minimax-m2.5:free"

    jury:
      juror: "x-ai/grok-4.20-multi-agent-beta"
