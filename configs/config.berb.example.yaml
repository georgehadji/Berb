project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  # ============================================================================
  # PROVIDER SELECTION
  # ============================================================================
  # Option 1: OpenRouter (Recommended - Single key for 100+ models)
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"
  
  # Option 2: Direct provider (for higher rate limits)
  # provider: "minimax"
  # base_url: "https://api.minimax.io/v1"
  # api_key_env: "MINIMAX_API_KEY"
  
  wire_api: "chat_completions"  # Set to "responses" for Responses-only gateways
  api_key: ""
  
  # Optimized defaults (97% cost savings vs premium)
  primary_model: "qwen/qwen3.5-flash-02-23"
  fallback_models:
    - "minimax/minimax-m2.5:free"
    - "z-ai/glm-4.7-flash"
    - "qwen/qwen3.5-9b"
  
  # --- Provider-specific examples ---
  # MiniMax (best budget):
  #   primary_model: "minimax/minimax-m2.5"
  #   fallback_models: ["minimax/minimax-m2.5:free"]
  # Qwen (best value):
  #   primary_model: "qwen/qwen3.5-flash"
  #   fallback_models: ["qwen/qwen3.5-9b"]
  # MiMo (best coding value):
  #   primary_model: "xiaomi/mimo-v2-flash"
  #   fallback_models: ["qwen/qwen3-coder-next"]

# ============================================================================
# REASONING METHODS - Optimized Model Routing (97% Cost Savings)
# ============================================================================
# Configure per-method, per-phase model routing for all 9 reasoning methods.
# Uses 27 unique roles across all methods with provider diversity.
#
# Provider Diversity Targets (no single provider >40%):
#   MiniMax: 25% | Qwen: 25% | MiMo: 15% | GLM: 10% | xAI: 10% |
#   Kimi: 5% | Perplexity: 5% | DeepSeek: 3% | Google: 2%
#
# Cost Budget: $6.00 per full reasoning run (all 9 methods)
# ============================================================================

reasoning:
  # Global defaults
  default_model: "minimax/minimax-m2.5:free"
  fallback_models:
    - "qwen/qwen3.5-flash-02-23"
    - "z-ai/glm-4.7-flash"
  
  # Provider diversity weights (target % of calls)
  provider_weights:
    minimax: 0.25
    qwen: 0.25
    mimo: 0.15
    glm: 0.10
    xai: 0.10
    kimi: 0.05
    perplexity: 0.05
    deepseek: 0.03
    google: 0.02
  
  # Cost budget (max $6 per full reasoning run)
  cost_budget_usd: 6.00
  
  # Per-method optimized routing (27 roles total)
  methods:
    # Multi-Perspective Analysis (5 roles)
    multi_perspective:
      constructive: "xiaomi/mimo-v2-pro"          # Premium value ($1/$3)
      destructive: "qwen/qwen3.5-397b-a17b"       # Elite performance ($0.39/$2.34)
      systemic: "z-ai/glm-5"                       # Agent workflows ($0.72/$2.30)
      minimalist: "minimax/minimax-m2.5:free"     # FREE
      scoring: "qwen/qwen3-coder-next"            # Coding value ($0.12/$0.75)
    
    # Pre-Mortem Failure Analysis (4 roles)
    pre_mortem:
      narrative: "qwen/qwen3-max-thinking"        # Complex reasoning ($0.78/$3.90)
      root_cause: "qwen/qwen3-coder-next"         # Debugging ($0.12/$0.75)
      early_warning: "minimax/minimax-m2.5:free"  # FREE
      hardened: "xiaomi/mimo-v2-pro"              # Premium value ($1/$3)
    
    # Bayesian Reasoning (3 roles)
    bayesian:
      prior: "z-ai/glm-4.7-flash"                 # Value ($0.60/$2.20)
      likelihood: "minimax/minimax-m2.5:free"     # FREE
      sensitivity: "qwen/qwen3.5-flash-02-23"     # Long-context ($0.065/$0.26)
    
    # Debate Method (3 roles)
    debate:
      pro: "qwen/qwen3.5-397b-a17b"               # Elite value ($0.39/$2.34)
      con: "qwen/qwen3-max-thinking"              # Complex reasoning ($0.78/$3.90)
      judge: "x-ai/grok-4.20-beta"                # Low hallucination ($2/$6)
    
    # Dialectical Method (3 roles)
    dialectical:
      thesis: "z-ai/glm-5"                        # Agent flagship ($0.72/$2.30)
      antithesis: "qwen/qwen3.5-397b-a17b"        # Elite value ($0.39/$2.34)
      synthesis: "moonshotai/kimi-k2.5"           # Reasoning ($0.47/$2.00)

    # Research Method (4 roles)
    research:
      query: "perplexity/sonar-pro-search"        # Built-in search ($3/$15 + search)
      synthesis: "qwen/qwen3.5-plus-02-15"        # Balanced ($0.26/$1.56)
      gap: "minimax/minimax-m2.5:free"            # FREE
      final: "xiaomi/mimo-v2-pro"                 # Premium value ($1/$3)

    # Socratic Method (5 roles)
    socratic:
      clarification: "z-ai/glm-4.7-flash"         # FREE
      assumption: "z-ai/glm-4.7-flash"            # Budget ($0.06/$0.40)
      evidence: "minimax/minimax-m2.5:free"       # FREE
      perspective: "qwen/qwen3.5-35b-a3b"          # Value ($0.16/$1.30)
      meta: "moonshotai/kimi-k2.5"                # Reasoning ($0.47/$2.00)
    
    # Scientific Method (5 roles)
    scientific:
      observation: "z-ai/glm-4.7"                 # Value ($0.39/$1.75)
      hypothesis: "qwen/qwen3-max-thinking"       # Complex reasoning ($0.78/$3.90)
      prediction: "qwen/qwen3-coder-next"         # Coding value ($0.12/$0.75)
      experiment: "moonshotai/kimi-k2.5"          # Visual coding ($0.42/$2.20)
      analysis: "minimax/minimax-m2.5:free"       # FREE
    
    # Jury Method (3 roles)
    jury:
      juror: "x-ai/grok-4.20-multi-agent-beta"    # Multi-agent ($2/$6)
      foreman: "qwen/qwen3.5-plus-02-15"           # Balanced ($0.26/$1.56)
      verdict: "z-ai/glm-5"                       # Agent flagship ($0.72/$2.30)

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  # ★ mode 决定实验结果的真实性
  #   "sandbox"   — 在本地沙盒中实际执行生成的 Python 代码，产出真实实验数据
  #   "docker"    — 在 Docker 容器中执行，支持 GPU 直通、依赖自动安装、内存隔离
  #   "simulated" — 不执行代码，使用公式生成假数据（仅用于框架开发调试，不应用于论文生成）
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    # Use ".venv/Scripts/python.exe" on Windows
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096
  # Docker sandbox settings (only used when mode: "docker")
  # Build image first: docker build -t berb/experiment:latest berb/docker/
  docker:
    image: "berb/experiment:latest"
    gpu_enabled: true
    # gpu_device_ids: [0]        # empty = all GPUs
    memory_limit_mb: 8192
    network_policy: "setup_only"  # none | setup_only | pip_only | full
    # pip_pre_install: ["torchdiffeq", "einops"]
    auto_install_deps: true
    shm_size_mb: 2048
    keep_containers: false
  ssh_remote:
    host: ""                # SSH hostname or IP
    user: ""                # SSH username (default: current user)
    port: 22                # SSH port
    key_path: ""            # Path to private key (default: ~/.ssh/id_rsa)
    gpu_ids: []             # e.g. [0, 1] for CUDA_VISIBLE_DEVICES
    remote_workdir: "/tmp/berb_experiments"
    remote_python: "python3"
    setup_commands: []      # e.g. ["source ~/venv/bin/activate", "pip install torch"]
    # Docker-over-SSH (most secure remote execution)
    use_docker: false       # Set true to run experiments inside Docker on remote host
    docker_image: "berb/experiment:latest"
    docker_network_policy: "none"   # none | full
    docker_memory_limit_mb: 8192
    docker_shm_size_mb: 2048
  # OpenCode Beast Mode — external AI coding agent for complex experiments
  # Install: npm i -g opencode-ai@latest  (or use `berb setup`)
  opencode:
    enabled: true                # Master switch (default: true)
    auto: true                   # Auto-trigger without confirmation (default: true)
    complexity_threshold: 0.2    # 0.0-1.0 — higher = only trigger on complex experiments
    model: ""                    # Override model (empty = use llm.primary_model)
    timeout_sec: 600             # Max seconds for OpenCode generation
    max_retries: 1               # Retry count on failure
    workspace_cleanup: true      # Remove temp workspace after collection

# ============================================================================
# SSH Remote Examples
# ============================================================================
#
# 1. Lab server (bare Python, basic sandboxing):
#   experiment:
#     mode: "ssh_remote"
#     ssh_remote:
#       host: "gpu-server.lab.edu"
#       user: "researcher"
#       key_path: "~/.ssh/id_rsa"
#       gpu_ids: [0]
#       remote_python: "python3"
#
# 2. Lab server (Docker — most secure):
#   experiment:
#     mode: "ssh_remote"
#     ssh_remote:
#       host: "gpu-server.lab.edu"
#       user: "researcher"
#       key_path: "~/.ssh/id_rsa"
#       gpu_ids: [0]
#       use_docker: true
#       docker_image: "berb/experiment:latest"
#       docker_network_policy: "none"
#
# 3. Colab via SSH tunnel:
#   experiment:
#     mode: "ssh_remote"
#     ssh_remote:
#       host: "localhost"
#       port: 12345
#       user: "root"
#       remote_python: "python3"
#       setup_commands:
#         - "pip install torch torchvision -q"
#
# 4. Colab via Google Drive (most robust, no SSH needed):
#   experiment:
#     mode: "colab_drive"
#     colab_drive:
#       drive_root: "~/Library/CloudStorage/GoogleDrive-you@gmail.com/My Drive/berb"
#       poll_interval_sec: 30
#       timeout_sec: 3600
#       setup_script: "pip install torch torchvision -q"
#   # Then in Colab: run the colab_worker.py that appears in your Drive

  colab_drive:
    drive_root: ""          # Local path to Google Drive mount
    poll_interval_sec: 30   # How often to check for results
    timeout_sec: 3600       # Max wait per experiment (1 hour)
    setup_script: ""        # Shell commands to run before each experiment

  # Scientific Visualization Agent (Code-to-Viz + Nano Banana)
  # Uses a Decision Agent to analyze paper content and determine:
  #   - Code figures (bar charts, line plots) → Matplotlib/TikZ
  #   - Image figures (architecture, flowcharts) → Gemini Nano Banana
  figure_agent:
    enabled: true
    min_figures: 3
    max_figures: 10
    max_iterations: 3
    render_timeout_sec: 30
    # Security: Docker sandbox for visualization code execution
    # use_docker: null  # null = auto-detect, true = force, false = disable
    docker_image: "berb/experiment:latest"
    # Output format: "python" (Matplotlib/Seaborn) or "latex" (TikZ/PGFPlots)
    output_format: "python"
    # Nano Banana (Gemini native image generation)
    nano_banana_enabled: true
    # gemini_api_key: ""  # or set GEMINI_API_KEY env var
    gemini_model: "gemini-2.5-flash-image"
    strict_mode: false
    dpi: 300

# === Prompts ===
# Customize LLM prompts by pointing to your own YAML file.
# Copy prompts.default.yaml, edit the prompts you want, and set the path here.
prompts:
  custom_file: ""  # e.g. "my_prompts.yaml" (empty = use built-in defaults)


# === MetaClaw Integration ===
# Enable the MetaClaw bridge to get skill injection, PRM quality gates,
# and continuous learning from research pipeline failures.
# Requires MetaClaw to be running: metaclaw start --mode skills_only
metaclaw_bridge:
  enabled: false
  proxy_url: "http://localhost:30000"    # MetaClaw proxy endpoint
  skills_dir: "~/.metaclaw/skills"       # MetaClaw skills directory
  fallback_url: ""                       # Direct LLM URL if proxy is down
  fallback_api_key: ""

  # PRM quality gate: LLM-as-judge scoring at gate stages
  prm:
    enabled: false
    api_base: ""                         # OpenAI-compatible API for PRM judge
    api_key_env: "PRM_API_KEY"
    api_key: ""
    model: "gpt-5.4"
    votes: 3                             # Majority vote count
    gate_stages: [5, 9, 15, 20]          # Stages to apply PRM gating

  # Lesson-to-skill: auto-convert pipeline failures into MetaClaw skills
  lesson_to_skill:
    enabled: true
    min_severity: "error"                # Only convert error-level lessons
    max_skills_per_run: 3
