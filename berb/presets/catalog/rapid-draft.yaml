# Preset: Rapid Draft
# Minimal-cost, fast iteration — idea validation and pre-submission drafts.

name: rapid-draft
description: >
  Speed-optimised preset for fast idea validation and rough drafts. Skips
  expensive stages (full review ensemble, reproducibility packaging) and
  uses budget models wherever quality tolerance allows.
tags:
  - rapid
  - draft
  - low-cost
  - iteration

# Literature
primary_sources:
  - semantic_scholar
search_engines:
  - google_scholar
grey_sources:
  - arxiv
full_text_access:
  - arxiv

# Model routing — lean toward budget
primary_model: claude-haiku-4-5-20251001
reasoning_model: claude-sonnet-4-6
budget_model: claude-haiku-4-5-20251001
fallback_models: []

# Pipeline — skip slow/expensive stages
enabled_stages:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 7
  - 8
  - 9
  - 10
  - 12
  - 14
  - 16
  - 17
  - 18
  - 20
  - 23

stage_overrides:
  3:
    max_papers: 20
  17:
    reviewer_count: 2

# Experiment execution
experiment_mode: sandbox
experiment_frameworks:
  - scikit-learn
  - pandas
validation_methods:
  - basic_sanity_check

# Paper writing
paper_format: arxiv
target_venue: null
max_pages: 8
style_profile: auto
citation_style: numeric

# Quality (relaxed for speed)
min_literature_papers: 20
min_quality_score: 6.0
min_novelty_score: 5.5

# Budget
max_budget_usd: 0.50
cost_optimization: aggressive
